<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Store</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #000000;
    --surface: #1c1c1e;
    --surface-2: #2c2c2e;
    --divider: rgba(255,255,255,0.08);
    --text: #ffffff;
    --muted: #8e8e93;
    --green: #30d158;
    --red: #ff453a;
    --blue: #0a84ff;
    --purple: #bf5af2;
    --pink: #ff375f;
    --orange: #ff9f0a;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px 16px 40px;
  }
  h1 { font-size: 26px; font-weight: 700; margin: 0 0 2px; letter-spacing: -0.02em; }
  .subtitle { color: var(--muted); font-size: 13.5px; margin: 0 0 20px; }

  .eyebrow {
    font-size: 12px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--muted); margin: 24px 4px 8px;
  }

  .list { background: var(--surface); border-radius: 16px; overflow: hidden; }
  .row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; border-bottom: 1px solid var(--divider);
  }
  .row:last-child { border-bottom: none; }

  .icon {
    width: 42px; height: 42px; border-radius: 11px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 20px;
    object-fit: cover; position: relative;
  }
  .icon .badge-dot {
    position: absolute; bottom: -2px; right: -2px; width: 12px; height: 12px;
    border-radius: 50%; border: 2px solid var(--surface);
  }
  .badge-dot.on { background: var(--green); }
  .badge-dot.off { background: var(--red); }

  .row-main { flex: 1; min-width: 0; }
  .row-title { font-size: 15px; font-weight: 600; }
  .row-sub { font-size: 12.5px; color: var(--muted); margin-top: 2px; }
  .row-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .price { font-size: 14.5px; font-weight: 700; color: var(--green); }
  .stock-tag { font-size: 10.5px; color: var(--muted); }
  .stock-tag.out { color: var(--red); }
  .chev { color: var(--muted); font-size: 18px; margin-left: 2px; }

  .empty { text-align: center; color: var(--muted); margin-top: 60px; font-size: 14px; }

  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.6);
    display: none; align-items: flex-end; justify-content: center; z-index: 10;
  }
  .overlay.show { display: flex; }
  .sheet {
    background: var(--surface); width: 100%; max-width: 480px;
    border-radius: 20px 20px 0 0; padding: 20px 18px 30px;
  }
  .sheet-handle { width: 36px; height: 4px; background: var(--surface-2); border-radius: 4px; margin: 0 auto 16px; }
  .sheet h3 { font-size: 18px; font-weight: 700; margin: 0 0 4px; }
  .sheet .sub { color: var(--muted); font-size: 13.5px; margin: 0 0 18px; }

  .pay-option {
    display: flex; align-items: center; gap: 12px; width: 100%; margin-top: 8px; text-align: left;
    background: var(--surface-2); border: none; color: var(--text);
    border-radius: 13px; padding: 13px 14px; font-size: 14.5px; font-weight: 500;
  }
  .close-btn { background: transparent; color: var(--muted); text-align: center; width: 100%; margin-top: 14px; padding: 10px; font-size: 14px; }

  .addr-box {
    background: var(--surface-2); border-radius: 12px; padding: 12px; margin-top: 10px;
    font-size: 13px; word-break: break-all; display: flex; justify-content: space-between; align-items: center; gap: 10px;
  }
  .addr-net { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; display: block; margin-bottom: 4px; }
  .copy-chip { flex-shrink: 0; background: var(--green); color: #04220e; border: none; border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 700; }

  .confirm-btn {
    width: 100%; margin-top: 18px; background: var(--green); color: #04220e;
    border: none; border-radius: 13px; padding: 14px; font-size: 15px; font-weight: 700;
  }
</style>
</head>
<body>
  <h1>Store</h1>
  <p class="subtitle">Digital goods · instant delivery</p>

  <p class="eyebrow">Products</p>
  <div id="grid" class="list"></div>
  <div id="empty" class="empty" style="display:none">No products available right now</div>

  <p class="eyebrow">Help</p>
  <div class="list">
    <div class="row" id="supportRow" style="cursor:pointer">
      <div class="icon" style="background:var(--pink)">🆘</div>
      <div class="row-main"><div class="row-title">Support</div><div class="row-sub">Contact us for help</div></div>
      <div class="chev">›</div>
    </div>
  </div>

  <div id="overlay" class="overlay">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <h3 id="sheetTitle"></h3>
      <p class="sub" id="sheetDesc"></p>
      <button class="pay-option" onclick="pay('usdt')"><span>💵</span> Pay with USDT</button>
      <button class="pay-option" onclick="pay('binance')"><span>🟡</span> Pay with Binance Pay</button>
      <button class="close-btn" onclick="closeSheet('overlay')">Cancel</button>
    </div>
  </div>

  <div id="payOverlay" class="overlay">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <h3 id="payTitle"></h3>
      <p class="sub" id="payDesc"></p>
      <div id="addrList"></div>
      <button class="confirm-btn" onclick="confirmPaid()">✅ I have paid</button>
      <button class="close-btn" onclick="closeSheet('payOverlay')">Cancel</button>
    </div>
  </div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

let currentProduct = null;
let currentOrder = null;

document.getElementById('supportRow').onclick = () => tg.openTelegramLink('https://t.me/No111x');

const ICONS = ['🛒','💾','🔑','🎮','📀','🖥️'];
const COLORS = ['var(--blue)','var(--purple)','var(--orange)','var(--pink)','var(--green)'];

async function loadProducts() {
  const res = await fetch('/api/products');
  const products = await res.json();
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  grid.innerHTML = '';
  if (!products.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  products.forEach((p, i) => {
    const out = p.available <= 0;
    const row = document.createElement('div');
    row.className = 'row';
    if (!out) row.style.cursor = 'pointer';
    const iconInner = p.has_image
      ? `<img class="icon" src="/image/${p.id}" alt=""><span class="badge-dot ${out ? 'off' : 'on'}" style="position:absolute"></span>`
      : `<div class="icon" style="background:${COLORS[i % COLORS.length]}">${ICONS[i % ICONS.length]}<span class="badge-dot ${out ? 'off' : 'on'}"></span></div>`;
    row.innerHTML = `
      ${iconInner}
      <div class="row-main">
        <div class="row-title">${p.name}</div>
        <div class="row-sub">${p.description || ''}</div>
      </div>
      <div class="row-right">
        <div class="price">$${p.price}</div>
        <div class="stock-tag ${out ? 'out' : ''}">${out ? 'out of stock' : p.available + ' in stock'}</div>
      </div>
      ${out ? '' : '<div class="chev">›</div>'}
    `;
    if (!out) row.onclick = () => openSheet(p);
    grid.appendChild(row);
  });
}

function openSheet(p) {
  currentProduct = p;
  document.getElementById('sheetTitle').textContent = p.name;
  document.getElementById('sheetDesc').textContent = `$${p.price} · choose a payment method`;
  document.getElementById('overlay').classList.add('show');
}
function closeSheet(id) { document.getElementById(id).classList.remove('show'); }

async function pay(method) {
  if (!currentProduct) return;
  const res = await fetch('/api/order', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ initData: tg.initData, product_id: currentProduct.id, method })
  });
  const data = await res.json();
  closeSheet('overlay');
  if (!data.ok) { tg.showAlert(data.error || 'Something went wrong'); return; }
  currentOrder = data.order_id;

  document.getElementById('payTitle').textContent = method === 'usdt' ? 'Pay with USDT' : 'Pay with Binance Pay';
  document.getElementById('payDesc').textContent = `Send $${currentProduct.price} to the address below, then confirm.`;
  const addrList = document.getElementById('addrList');
  addrList.innerHTML = '';
  if (method === 'usdt') {
    const addrs = data.usdt_addresses;
    [['TRC20', addrs.trc20], ['BEP20', addrs.bep20], ['ERC20', addrs.erc20]].forEach(([net, addr]) => {
      if (addr) addrList.appendChild(makeAddrBox(net, addr));
    });
  } else {
    addrList.appendChild(makeAddrBox('Binance Pay ID', data.binance_id));
  }
  document.getElementById('payOverlay').classList.add('show');
}

function makeAddrBox(label, addr) {
  const box = document.createElement('div');
  box.className = 'addr-box';
  box.innerHTML = `<div><span class="addr-net">${label}</span>${addr}</div><button class="copy-chip">Copy</button>`;
  box.querySelector('.copy-chip').onclick = () => {
    navigator.clipboard.writeText(addr).catch(() => {});
    tg.HapticFeedback && tg.HapticFeedback.notificationOccurred('success');
    const chip = box.querySelector('.copy-chip');
    chip.textContent = 'Copied'; setTimeout(() => chip.textContent = 'Copy', 1200);
  };
  return box;
}

async function confirmPaid() {
  if (!currentOrder) return;
  await fetch('/api/confirm-payment', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ initData: tg.initData, order_id: currentOrder })
  });
  closeSheet('payOverlay');
  tg.showAlert('Your order was sent for review — it will be delivered within minutes.');
}

loadProducts();
</script>
</body>
</html>
