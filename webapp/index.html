<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Store</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #000000;
    --card: #1c1c1e;
    --pill: rgba(255,255,255,0.14);
    --divider: rgba(255,255,255,0.09);
    --text: #ffffff;
    --muted: #98989d;
    --blue: #0a84ff;
    --green: #30d158;
    --red: #ff453a;
    --orange: #ff9f0a;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-font-smoothing: antialiased; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 14px 16px 100px;
  }

  .headerRow { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  h1 { font-size: 34px; font-weight: 800; margin: 0; letter-spacing: -0.02em; }
  .avatar {
    width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(145deg,#5e5ce6,#0a84ff);
    display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0;
  }

  .search-bar {
    display: flex; align-items: center; gap: 8px; background: var(--card); border-radius: 13px;
    padding: 10px 12px; margin-bottom: 22px;
  }
  .search-bar input {
    border: none; background: transparent; color: var(--text); font-size: 15.5px; flex: 1; outline: none;
  }
  .search-bar input::placeholder { color: var(--muted); }
  .search-bar .icon-glyph { color: var(--muted); font-size: 15px; }

  .section { margin-bottom: 26px; }
  .section-title { font-size: 21px; font-weight: 800; letter-spacing: -0.01em; margin: 0 2px 10px; }

  .card { background: var(--card); border-radius: 20px; overflow: hidden; }
  .row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-bottom: 0.5px solid var(--divider); }
  .row:last-child { border-bottom: none; }
  .row:active { background: rgba(255,255,255,0.04); }

  .app-icon {
    width: 54px; height: 54px; border-radius: 14px; flex-shrink: 0; position: relative;
    display: flex; align-items: center; justify-content: center; font-size: 24px; color: #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.35); object-fit: cover;
  }
  .row-main { flex: 1; min-width: 0; }
  .row-title { font-size: 15.5px; font-weight: 600; letter-spacing: -0.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row-sub { font-size: 12.5px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .pill-btn {
    flex-shrink: 0; background: var(--pill); color: var(--blue); border: none;
    border-radius: 50px; padding: 7px 16px; font-size: 13.5px; font-weight: 700; min-width: 64px; text-align: center;
    transition: transform 0.1s ease, background 0.15s ease;
  }
  .pill-btn:active { transform: scale(0.92); background: rgba(255,255,255,0.22); }
  .pill-btn.sold-out { color: var(--muted); }

  .empty { text-align: center; color: var(--muted); margin-top: 60px; font-size: 14px; }

  .status-badge { font-size: 10.5px; font-weight: 700; padding: 4px 11px; border-radius: 20px; flex-shrink: 0; }
  .status-badge.pending { color: #431a00; background: var(--orange); }
  .status-badge.processing { color: #fff; background: var(--blue); }
  .status-badge.delivered { color: #04220e; background: var(--green); }
  .status-badge.rejected { color: #fff; background: var(--red); }
  .code-box { background: rgba(255,255,255,0.08); border-radius: 12px; padding: 13px; margin-top: 12px; font-size: 13.5px; word-break: break-all; font-family: ui-monospace, monospace; }
  .detail-line { display: flex; justify-content: space-between; gap: 10px; padding: 8px 0; border-bottom: 0.5px solid var(--divider); font-size: 13.5px; }
  .detail-line:last-child { border-bottom: none; }
  .detail-line .k { color: var(--muted); }

  /* floating bottom tab bar */
  .tabbar {
    position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%);
    display: flex; gap: 6px; background: rgba(28,28,30,0.85); backdrop-filter: blur(24px) saturate(180%); -webkit-backdrop-filter: blur(24px) saturate(180%);
    border: 0.5px solid rgba(255,255,255,0.08); border-radius: 22px; padding: 8px 10px; z-index: 25;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  }
  .tab-item {
    display: flex; flex-direction: column; align-items: center; gap: 2px; background: transparent; border: none;
    color: var(--muted); padding: 6px 22px; border-radius: 16px; font-size: 10.5px; font-weight: 600;
    transition: color 0.15s ease, background 0.15s ease;
  }
  .tab-item .tab-icon { font-size: 20px; }
  .tab-item.active { color: var(--blue); }

  /* sheets */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); backdrop-filter: blur(2px); display: none; align-items: flex-end; justify-content: center; z-index: 30; opacity: 0; transition: opacity 0.25s ease; }
  .overlay.show { display: flex; opacity: 1; }
  .sheet {
    background: rgba(28,28,30,0.9); backdrop-filter: blur(30px) saturate(180%); -webkit-backdrop-filter: blur(30px) saturate(180%);
    width: 100%; max-width: 480px; border-radius: 24px 24px 0 0; padding: 10px 18px 30px; max-height: 88vh; overflow-y: auto;
    border: 0.5px solid rgba(255,255,255,0.08); border-bottom: none;
    transform: translateY(100%); transition: transform 0.3s cubic-bezier(.2,.9,.3,1);
  }
  .overlay.show .sheet { transform: translateY(0); }
  .sheet-handle { width: 36px; height: 5px; background: rgba(255,255,255,0.25); border-radius: 4px; margin: 10px auto 16px; }
  .sheet h3 { font-size: 19px; font-weight: 700; margin: 0 0 4px; letter-spacing: -0.02em; }
  .sheet .sub { color: var(--muted); font-size: 13.5px; margin: 0 0 18px; }

  label { display: block; font-size: 12.5px; color: var(--muted); margin: 14px 2px 6px; font-weight: 500; }
  input[type=text], input[type=email] {
    width: 100%; background: rgba(255,255,255,0.08); border: none; color: var(--text);
    border-radius: 11px; padding: 12px 13px; font-size: 15px;
  }
  input[type=text]:focus, input[type=email]:focus { outline: 2px solid var(--blue); outline-offset: -1px; }

  .pay-option {
    display: flex; align-items: center; gap: 12px; width: 100%; margin-top: 8px; text-align: left;
    background: rgba(255,255,255,0.08); border: none; color: var(--text); border-radius: 14px;
    padding: 14px 14px; font-size: 15px; font-weight: 500; transition: transform 0.1s ease, background 0.15s ease;
  }
  .pay-option:active { transform: scale(0.98); background: rgba(255,255,255,0.14); }
  .close-btn { background: transparent; color: var(--blue); text-align: center; width: 100%; margin-top: 14px; padding: 12px; font-size: 15.5px; font-weight: 590; }
  .close-btn:active { opacity: 0.5; }

  .addr-box { background: rgba(255,255,255,0.08); border-radius: 13px; padding: 13px; margin-top: 10px; font-size: 13px; word-break: break-all; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .addr-net { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 4px; }
  .copy-chip { flex-shrink: 0; background: var(--blue); color: #fff; border: none; border-radius: 9px; padding: 7px 13px; font-size: 12.5px; font-weight: 600; transition: transform 0.1s ease; }
  .copy-chip:active { transform: scale(0.92); }

  .proof-picker { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.08); border-radius: 13px; padding: 12px; margin-top: 14px; }
  .proof-picker img { width: 42px; height: 42px; border-radius: 9px; object-fit: cover; }
  .proof-picker .placeholder { width: 42px; height: 42px; border-radius: 9px; background: rgba(255,255,255,0.06); display:flex; align-items:center; justify-content:center; font-size:19px; }
  .proof-picker label { margin: 0; flex: 1; font-size: 14px; color: var(--blue); font-weight: 500; }

  .confirm-btn {
    width: 100%; margin-top: 18px; background: var(--blue); color: #fff; border: none;
    border-radius: 14px; padding: 15px; font-size: 15.5px; font-weight: 600;
    transition: transform 0.1s ease, opacity 0.2s ease;
  }
  .confirm-btn:active:not(:disabled) { transform: scale(0.98); }
  .confirm-btn:disabled { opacity: 0.35; }
</style>
</head>
<body>
  <div id="storeScreen">
    <div class="headerRow">
      <h1>Store</h1>
      <div class="avatar" id="avatarBtn">🛍️</div>
    </div>

    <div class="search-bar">
      <span class="icon-glyph">🔍</span>
      <input type="text" id="searchInput" placeholder="Search products">
    </div>

    <div id="sections"></div>
    <div id="empty" class="empty" style="display:none">No products found</div>
  </div>

  <div id="ordersScreen" style="display:none">
    <div class="headerRow">
      <h1>My Orders</h1>
    </div>
    <div id="myOrdersList" class="card"></div>
    <div id="myOrdersEmpty" class="empty" style="display:none">No orders yet</div>
  </div>

  <div class="tabbar">
    <button class="tab-item active" id="tabStore"><span class="tab-icon">🏬</span>Store</button>
    <button class="tab-item" id="tabOrders"><span class="tab-icon">🧾</span>Orders</button>
    <button class="tab-item" id="tabSupport"><span class="tab-icon">🆘</span>Support</button>
  </div>

  <div id="overlay" class="overlay">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <h3 id="sheetTitle"></h3>
      <p class="sub" id="sheetDesc"></p>
      <div id="buyExtraFields"></div>
      <button class="pay-option" onclick="pay('usdt')"><span>💵</span> Pay with USDT</button>
      <button class="pay-option" onclick="pay('binance')"><span>🟡</span> Pay with Binance Pay</button>
      <button class="close-btn" onclick="closeSheet('overlay')">Cancel</button>
    </div>
  </div>

  <div id="payOverlay" class="overlay">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <h3 id="payTitle"></h3>
      <p class="sub" id="payDesc"></p>
      <div id="addrList"></div>
      <div class="proof-picker">
        <img id="proofPreview" style="display:none">
        <div class="placeholder" id="proofPlaceholder">📸</div>
        <label for="proofInput">Attach payment screenshot</label>
        <input type="file" id="proofInput" accept="image/*" style="display:none">
      </div>
      <button class="confirm-btn" id="confirmBtn" disabled onclick="confirmPaid()">I have paid</button>
      <button class="close-btn" onclick="closeSheet('payOverlay')">Cancel</button>
    </div>
  </div>

  <div id="orderDetailOverlay" class="overlay">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <h3 id="odTitle"></h3>
      <p class="sub" id="odSub"></p>
      <div id="odBody"></div>
      <button class="close-btn" onclick="closeSheet('orderDetailOverlay')">Close</button>
    </div>
  </div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

let allProducts = [];
let currentProduct = null;
let currentOrder = null;
let proofBase64 = null;
let searchQuery = '';

document.getElementById('avatarBtn').onclick = () => tg.openTelegramLink('https://t.me/No111x');
document.getElementById('tabSupport').onclick = () => tg.openTelegramLink('https://t.me/No111x');
document.getElementById('tabStore').onclick = () => showScreen('store');
document.getElementById('tabOrders').onclick = () => showScreen('orders');

function showScreen(name) {
  document.getElementById('storeScreen').style.display = name === 'store' ? 'block' : 'none';
  document.getElementById('ordersScreen').style.display = name === 'orders' ? 'block' : 'none';
  document.getElementById('tabStore').classList.toggle('active', name === 'store');
  document.getElementById('tabOrders').classList.toggle('active', name === 'orders');
  window.scrollTo({ top: 0 });
  if (name === 'orders') loadMyOrders();
}

const STATUS_LABELS = {
  pending: 'Pending', awaiting_payment: 'Awaiting payment', pending_review: 'Under review',
  processing: 'Activating', delivered: 'Delivered', rejected: 'Rejected',
};
function statusClass(s) {
  if (s === 'delivered') return 'delivered';
  if (s === 'rejected') return 'rejected';
  if (s === 'processing') return 'processing';
  return 'pending';
}

async function loadMyOrders() {
  const res = await fetch('/api/my-orders', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ initData: tg.initData })
  });
  const data = await res.json();
  const list = document.getElementById('myOrdersList');
  const empty = document.getElementById('myOrdersEmpty');
  list.innerHTML = '';
  if (!data.ok || !data.orders.length) { empty.style.display = 'block'; list.style.display = 'none'; return; }
  empty.style.display = 'none'; list.style.display = 'block';
  data.orders.forEach(o => {
    const row = document.createElement('div');
    row.className = 'row';
    row.style.cursor = 'pointer';
    row.innerHTML = `
      <div class="row-main">
        <div class="row-title">#${o.id} · ${o.product_name}</div>
        <div class="row-sub">$${o.amount} · ${o.method.toUpperCase()}</div>
      </div>
      <span class="status-badge ${statusClass(o.status)}">${STATUS_LABELS[o.status] || o.status}</span>
    `;
    row.onclick = () => openOrderDetail(o.id);
    list.appendChild(row);
  });
}

async function openOrderDetail(orderId) {
  const res = await fetch('/api/my-orders/detail', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ initData: tg.initData, order_id: orderId })
  });
  const data = await res.json();
  if (!data.ok) { tg.showAlert(data.error || 'Could not load order'); return; }
  const o = data.order;
  document.getElementById('odTitle').textContent = o.product_name;
  document.getElementById('odSub').textContent = `Order #${o.id} · $${o.amount} · ${o.method.toUpperCase()}`;
  const body = document.getElementById('odBody');
  body.innerHTML = '';
  const priceLine = document.createElement('div');
  priceLine.className = 'detail-line';
  priceLine.innerHTML = `<span class="k">Price</span><span>$${o.amount}</span>`;
  body.appendChild(priceLine);
  const statusLine = document.createElement('div');
  statusLine.className = 'detail-line';
  statusLine.innerHTML = `<span class="k">Status</span><span class="status-badge ${statusClass(o.status)}">${STATUS_LABELS[o.status] || o.status}</span>`;
  body.appendChild(statusLine);

  if (o.customer_email) {
    const l = document.createElement('div'); l.className = 'detail-line';
    l.innerHTML = `<span class="k">Email</span><span>${o.customer_email}</span>`; body.appendChild(l);
  }
  if (o.customer_code) {
    const l = document.createElement('div'); l.className = 'detail-line';
    l.innerHTML = `<span class="k">Code sent</span><span>${o.customer_code}</span>`; body.appendChild(l);
  }
  if (o.status === 'delivered' && o.content) {
    const box = document.createElement('div');
    box.className = 'code-box';
    box.textContent = o.content;
    body.appendChild(box);
  } else if (o.status === 'processing') {
    const note = document.createElement('p');
    note.className = 'sub'; note.style.marginTop = '12px';
    note.textContent = "We're activating this now — you'll get a message the moment it's ready.";
    body.appendChild(note);
  } else if (o.status === 'pending_review' || o.status === 'awaiting_payment') {
    const note = document.createElement('p');
    note.className = 'sub'; note.style.marginTop = '12px';
    note.textContent = 'Your order is awaiting confirmation.';
    body.appendChild(note);
  } else if (o.status === 'rejected') {
    const note = document.createElement('p');
    note.className = 'sub'; note.style.marginTop = '12px';
    note.textContent = 'This payment could not be confirmed. Contact support if you believe this is a mistake.';
    body.appendChild(note);
  }
  document.getElementById('orderDetailOverlay').classList.add('show');
}

document.getElementById('searchInput').addEventListener('input', (e) => {
  searchQuery = e.target.value.trim().toLowerCase();
  renderSections();
});

const GRADIENTS = [
  'linear-gradient(145deg,#ff9f0a,#ff375f)',
  'linear-gradient(145deg,#0a84ff,#5e5ce6)',
  'linear-gradient(145deg,#30d158,#0a84ff)',
  'linear-gradient(145deg,#bf5af2,#ff375f)',
  'linear-gradient(145deg,#ffd60a,#ff9f0a)',
  'linear-gradient(145deg,#64d2ff,#5e5ce6)',
];
function gradientFor(seed) {
  let h = 0;
  for (let i = 0; i < seed.length; i++) h = (h * 31 + seed.charCodeAt(i)) >>> 0;
  return GRADIENTS[h % GRADIENTS.length];
}

async function loadProducts() {
  const res = await fetch('/api/products');
  allProducts = await res.json();
  renderSections();
}

function renderSections() {
  const container = document.getElementById('sections');
  const empty = document.getElementById('empty');
  container.innerHTML = '';

  let filtered = allProducts;
  if (searchQuery) {
    filtered = allProducts.filter(p =>
      p.name.toLowerCase().includes(searchQuery) || (p.description || '').toLowerCase().includes(searchQuery)
    );
  }
  if (!filtered.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  const categories = [...new Set(filtered.map(p => p.category || 'General'))];
  categories.forEach(cat => {
    const items = filtered.filter(p => (p.category || 'General') === cat);
    const section = document.createElement('div');
    section.className = 'section';
    const card = document.createElement('div');
    card.className = 'card';
    items.forEach(p => card.appendChild(buildRow(p)));
    section.innerHTML = `<div class="section-title">${cat}</div>`;
    section.appendChild(card);
    container.appendChild(section);
  });
}

function buildRow(p) {
  const isStock = (p.delivery_type || 'stock') === 'stock';
  const out = isStock && p.available <= 0;
  const row = document.createElement('div');
  row.className = 'row';
  const iconStyle = p.has_image ? '' : `background:${gradientFor(p.name)}`;
  const iconContent = p.has_image ? `<img class="app-icon" src="/image/${p.id}" alt="">` : `<div class="app-icon" style="${iconStyle}">🔑</div>`;
  row.innerHTML = `
    ${iconContent}
    <div class="row-main">
      <div class="row-title">${p.name}</div>
      <div class="row-sub">${p.description || ''}</div>
    </div>
    <button class="pill-btn ${out ? 'sold-out' : ''}">${out ? 'Sold out' : '$' + p.price}</button>
  `;
  if (!out) {
    const btn = row.querySelector('.pill-btn');
    btn.onclick = (e) => { e.stopPropagation(); openSheet(p); };
    row.onclick = () => openSheet(p);
    row.style.cursor = 'pointer';
  }
  return row;
}

function openSheet(p) {
  currentProduct = p;
  document.getElementById('sheetTitle').textContent = p.name;
  document.getElementById('sheetDesc').textContent = `$${p.price} · choose a payment method`;
  const extra = document.getElementById('buyExtraFields');
  extra.innerHTML = '';
  const dtype = p.delivery_type || 'stock';
  if (dtype === 'email' || dtype === 'email_code') {
    extra.innerHTML += `<label>Email for activation</label><input type="email" id="buyEmail" placeholder="you@example.com">`;
  }
  if (dtype === 'email_code') {
    extra.innerHTML += `<label>Password / code</label><input type="text" id="buyCode" placeholder="account password">`;
  }
  document.getElementById('overlay').classList.add('show');
}
function closeSheet(id) { document.getElementById(id).classList.remove('show'); }

async function pay(method) {
  if (!currentProduct) return;
  const dtype = currentProduct.delivery_type || 'stock';
  let email = null, code = null;
  if (dtype === 'email' || dtype === 'email_code') {
    email = (document.getElementById('buyEmail')?.value || '').trim();
    if (!email || !email.includes('@')) { tg.showAlert('Please enter a valid email'); return; }
  }
  if (dtype === 'email_code') {
    code = (document.getElementById('buyCode')?.value || '').trim();
    if (!code) { tg.showAlert('Please enter the account password/code'); return; }
  }
  const res = await fetch('/api/order', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ initData: tg.initData, product_id: currentProduct.id, method, email, code })
  });
  const data = await res.json();
  closeSheet('overlay');
  if (!data.ok) { tg.showAlert(data.error || 'Something went wrong'); return; }
  currentOrder = data.order_id;
  proofBase64 = null;
  document.getElementById('proofPreview').style.display = 'none';
  document.getElementById('proofPlaceholder').style.display = 'flex';
  document.getElementById('confirmBtn').disabled = true;

  document.getElementById('payTitle').textContent = method === 'usdt' ? 'Pay with USDT' : 'Pay with Binance Pay';
  document.getElementById('payDesc').textContent = `Send $${currentProduct.price} to the address below, then attach a screenshot.`;
  const addrList = document.getElementById('addrList');
  addrList.innerHTML = '';
  if (method === 'usdt') {
    const addrs = data.usdt_addresses;
    [['TRC20', addrs.trc20], ['BEP20', addrs.bep20], ['ERC20', addrs.erc20]].forEach(([net, addr]) => {
      if (addr) addrList.appendChild(makeAddrBox(net, addr));
    });
  } else {
    addrList.appendChild(makeAddrBox('Binance Pay ID', data.binance_id));
  }
  document.getElementById('payOverlay').classList.add('show');
}

function makeAddrBox(label, addr) {
  const box = document.createElement('div');
  box.className = 'addr-box';
  box.innerHTML = `<div><span class="addr-net">${label}</span>${addr}</div><button class="copy-chip">Copy</button>`;
  box.querySelector('.copy-chip').onclick = () => {
    navigator.clipboard.writeText(addr).catch(() => {});
    tg.HapticFeedback && tg.HapticFeedback.notificationOccurred('success');
    const chip = box.querySelector('.copy-chip');
    chip.textContent = 'Copied'; setTimeout(() => chip.textContent = 'Copy', 1200);
  };
  return box;
}

document.getElementById('proofInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      const maxDim = 1280;
      let { width, height } = img;
      if (width > maxDim || height > maxDim) {
        const scale = maxDim / Math.max(width, height);
        width = Math.round(width * scale);
        height = Math.round(height * scale);
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.72);
      proofBase64 = compressedDataUrl.split(',')[1];
      document.getElementById('proofPreview').src = compressedDataUrl;
      document.getElementById('proofPreview').style.display = 'block';
      document.getElementById('proofPlaceholder').style.display = 'none';
      document.getElementById('confirmBtn').disabled = false;
      tg.HapticFeedback && tg.HapticFeedback.impactOccurred('light');
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
});

async function confirmPaid() {
  if (!currentOrder || !proofBase64) return;
  const btn = document.getElementById('confirmBtn');
  btn.disabled = true;
  btn.textContent = 'Sending...';
  try {
    const res = await fetch('/api/confirm-payment', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ initData: tg.initData, order_id: currentOrder, proof_base64: proofBase64 })
    });
    if (!res.ok) throw new Error('Server error (' + res.status + ')');
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Could not submit payment');
    closeSheet('payOverlay');
    tg.HapticFeedback && tg.HapticFeedback.notificationOccurred('success');
    tg.showAlert('Your order was sent for review — it will be delivered within minutes.');
  } catch (err) {
    tg.showAlert('Something went wrong sending your payment proof: ' + err.message + '. Please try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'I have paid';
  }
}

loadProducts();
</script>
