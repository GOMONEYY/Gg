<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Store</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --bg-elevated: #12151c;
    --border: #1f2430;
    --text: #eef1f6;
    --muted: #7c8496;
    --accent: #29e0c2;
    --accent-dim: #17352f;
    --danger: #ff5470;
    --danger-dim: #3a1620;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 18px 16px 40px;
  }
  header { margin-bottom: 20px; }
  header .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 4px;
  }
  header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 24px;
    font-weight: 700;
    margin: 0;
    letter-spacing: -0.01em;
  }

  .grid { display: flex; flex-direction: column; gap: 10px; }

  .card {
    position: relative;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 14px 14px 18px;
    display: flex;
    gap: 12px;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
  }
  .card.out::before { background: var(--danger); }

  .thumb {
    width: 46px; height: 46px; border-radius: 10px; object-fit: cover;
    flex-shrink: 0; border: 1px solid var(--border);
  }
  .card-body { flex: 1; min-width: 0; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .card h3 {
    font-family: 'Space Grotesk', sans-serif;
    margin: 0; font-size: 15px; font-weight: 600; line-height: 1.3;
  }
  .card p {
    margin: 3px 0 0; color: var(--muted); font-size: 12.5px; line-height: 1.4;
  }
  .tag-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .price {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600; font-size: 14px; color: var(--accent);
  }
  .stock {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px; color: var(--muted);
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    padding: 2px 7px; border-radius: 20px;
  }
  .stock.out { color: var(--danger); }

  .buy-btn {
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 9px;
    padding: 7px 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11.5px;
    font-weight: 600;
    white-space: nowrap;
  }

  .empty { text-align: center; color: var(--muted); margin-top: 60px; font-family: 'IBM Plex Mono', monospace; font-size: 13px; }

  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.65);
    display: none; align-items: flex-end; justify-content: center; z-index: 10;
    backdrop-filter: blur(2px);
  }
  .overlay.show { display: flex; }
  .sheet {
    background: var(--bg-elevated); width: 100%; max-width: 480px;
    border: 1px solid var(--border); border-bottom: none;
    border-radius: 18px 18px 0 0; padding: 22px 18px 28px;
  }
  .sheet-handle {
    width: 36px; height: 4px; background: var(--border); border-radius: 4px; margin: 0 auto 16px;
  }
  .sheet h3 { font-family: 'Space Grotesk', sans-serif; margin: 0 0 4px; font-size: 17px; }
  .sheet .sub { color: var(--muted); font-size: 13px; margin: 0 0 18px; }

  .pay-option {
    display: flex; align-items: center; gap: 10px;
    width: 100%; margin-top: 8px; text-align: left;
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    border-radius: 12px; padding: 13px 14px; font-size: 14px; font-weight: 500;
    font-family: 'Inter', sans-serif;
  }
  .close-btn {
    background: transparent; color: var(--muted); text-align: center; width: 100%;
    margin-top: 14px; padding: 10px; font-size: 13px;
  }

  .addr-box {
    font-family: 'IBM Plex Mono', monospace;
    background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px; margin-top: 10px; font-size: 12.5px; word-break: break-all;
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
  }
  .addr-net { color: var(--muted); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 4px; }
  .copy-chip {
    flex-shrink: 0; background: var(--accent-dim); color: var(--accent);
    border: 1px solid var(--accent); border-radius: 8px; padding: 6px 10px;
    font-size: 11px; font-weight: 600;
  }

  .confirm-btn {
    width: 100%; margin-top: 18px; background: var(--accent); color: #06110e;
    border: none; border-radius: 12px; padding: 14px; font-size: 14.5px; font-weight: 700;
    font-family: 'Space Grotesk', sans-serif;
  }

  .support-link {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    margin-top: 26px; color: var(--muted); font-size: 12.5px; text-decoration: none;
    font-family: 'IBM Plex Mono', monospace;
  }
</style>
</head>
<body>
  <header>
    <p class="eyebrow">digital goods · instant delivery</p>
    <h1>Store</h1>
  </header>

  <div id="grid" class="grid"></div>
  <div id="empty" class="empty" style="display:none">// no products available right now</div>
  <a class="support-link" href="#" id="supportLink">🆘 support</a>

  <!-- payment method sheet -->
  <div id="overlay" class="overlay">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <h3 id="sheetTitle"></h3>
      <p class="sub" id="sheetDesc"></p>
      <button class="pay-option" onclick="pay('usdt')">💵 &nbsp; Pay with USDT</button>
      <button class="pay-option" onclick="pay('binance')">🟡 &nbsp; Pay with Binance Pay</button>
      <button class="close-btn" onclick="closeSheet('overlay')">Cancel</button>
    </div>
  </div>

  <!-- payment details sheet (address / confirm) -->
  <div id="payOverlay" class="overlay">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <h3 id="payTitle"></h3>
      <p class="sub" id="payDesc"></p>
      <div id="addrList"></div>
      <button class="confirm-btn" onclick="confirmPaid()">✅ I have paid</button>
      <button class="close-btn" onclick="closeSheet('payOverlay')">Cancel</button>
    </div>
  </div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

let currentProduct = null;
let currentOrder = null;

document.getElementById('supportLink').onclick = (e) => {
  e.preventDefault();
  tg.openTelegramLink('https://t.me/No111x');
};

async function loadProducts() {
  const res = await fetch('/api/products');
  const products = await res.json();
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  grid.innerHTML = '';
  if (!products.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  products.forEach(p => {
    const out = p.available <= 0;
    const card = document.createElement('div');
    card.className = 'card' + (out ? ' out' : '');
    const img = p.has_image ? `<img class="thumb" src="/image/${p.id}" alt="">` : '';
    card.innerHTML = `
      ${img}
      <div class="card-body">
        <div class="card-top">
          <div>
            <h3>${p.name}</h3>
            <p>${p.description || ''}</p>
          </div>
        </div>
        <div class="tag-row">
          <span class="price">$${p.price}</span>
          <span class="stock ${out ? 'out' : ''}">${out ? 'out of stock' : 'in stock: ' + p.available}</span>
        </div>
      </div>
    `;
    if (!out) {
      const btn = document.createElement('button');
      btn.className = 'buy-btn';
      btn.style.marginTop = '10px';
      btn.textContent = 'BUY →';
      btn.onclick = () => openSheet(p);
      card.querySelector('.card-body').appendChild(btn);
    }
    grid.appendChild(card);
  });
}

function openSheet(p) {
  currentProduct = p;
  document.getElementById('sheetTitle').textContent = p.name;
  document.getElementById('sheetDesc').textContent = `$${p.price} · choose a payment method`;
  document.getElementById('overlay').classList.add('show');
}
function closeSheet(id) {
  document.getElementById(id).classList.remove('show');
}

async function pay(method) {
  if (!currentProduct) return;
  const res = await fetch('/api/order', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ initData: tg.initData, product_id: currentProduct.id, method })
  });
  const data = await res.json();
  closeSheet('overlay');
  if (!data.ok) { tg.showAlert(data.error || 'Something went wrong'); return; }
  currentOrder = data.order_id;

  document.getElementById('payTitle').textContent = method === 'usdt' ? 'Pay with USDT' : 'Pay with Binance Pay';
  document.getElementById('payDesc').textContent = `Send $${currentProduct.price} to the address below, then confirm.`;
  const addrList = document.getElementById('addrList');
  addrList.innerHTML = '';

  if (method === 'usdt') {
    const addrs = data.usdt_addresses;
    const nets = [['TRC20', addrs.trc20], ['BEP20', addrs.bep20], ['ERC20', addrs.erc20]];
    nets.forEach(([net, addr]) => {
      if (!addr) return;
      addrList.appendChild(makeAddrBox(net, addr));
    });
  } else {
    addrList.appendChild(makeAddrBox('Binance Pay ID', data.binance_id));
  }
  document.getElementById('payOverlay').classList.add('show');
}

function makeAddrBox(label, addr) {
  const box = document.createElement('div');
  box.className = 'addr-box';
  box.innerHTML = `<div><span class="addr-net">${label}</span>${addr}</div><button class="copy-chip">copy</button>`;
  box.querySelector('.copy-chip').onclick = () => {
    navigator.clipboard.writeText(addr).catch(() => {});
    tg.HapticFeedback && tg.HapticFeedback.notificationOccurred('success');
    const chip = box.querySelector('.copy-chip');
    chip.textContent = 'copied';
    setTimeout(() => chip.textContent = 'copy', 1200);
  };
  return box;
}

async function confirmPaid() {
  if (!currentOrder) return;
  await fetch('/api/confirm-payment', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ initData: tg.initData, order_id: currentOrder })
  });
  closeSheet('payOverlay');
  tg.showAlert('Your order was sent for review — it will be delivered within minutes.');
}

loadProducts();
</script>
</body>
</html>
